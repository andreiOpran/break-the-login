name: Security CI (SAST/DAST)
on:
  push:
    branches: [ "fixed" ]
  pull_request:
    branches: [ "fixed" ]

jobs:
  sast-scan:
    name: SAST (Static Application Security Testing)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r app/ -c "bandit.yml"

  automated-security-tests:
    name: DAST (Dynamic Application Security Testing) with Automated Exploit Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run All PoC Tests (Automated Security Testing and Exploit Verification)
        run: |
          export TARGET_IP="http://127.0.0.1:8000"
          
          # list of all automation suitable poc's
          POCS=(
            "poc/4.1_weak_password_policy/KALI_weak_password_policy_trivial.sh"
            "poc/4.1_weak_password_policy/KALI_weak_password_policy_detailed.sh"
            "poc/4.3_brute_force/KALI_brute_force_no_ip_spoofing.sh"
            "poc/4.3_brute_force/KALI_brute_force_ip_spoofing.sh"
            "poc/4.3_brute_force/KALI_triple_shield_demo.sh"
            "poc/4.4_user_enumeration/KALI_user_enumeration.sh"
            "poc/4.5_token_reuse_after_logout/KALI_login_logout_use_token.sh"
            "poc/4.5_token_reuse_after_logout/KALI_rotation_test.sh"
            "poc/4.6_predictable_reset_token/KALI_latest_token_only.sh"
            "poc/4.6_predictable_reset_token/KALI_double_use_token.sh"
            "poc/4.6_predictable_reset_token/HOST_test_token_expiration.sh"
            "poc/4.6_predictable_reset_token/KALI_predict_reset_token.sh"
            "poc/IDOR/KALI_idor_tickets.sh"
            "poc/RBAC/KALI_analyst_changes_ticket_status.sh"
          )

          # test loop checking output and return codes, restarting the app and clearing the db
          for script in "${POCS[@]}"; do
              echo -e "\n======================================================================="
              echo "Running $script"
              
              # 1. clear the database and restart the app to clear the slowapi rate limiting + db rate limiting
              rm -f authx.db  
              uvicorn app.main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
              APP_PID=$!
              sleep 3
              
              # 2. seed dummy users
              chmod +x poc/HOST_create_dummy_users.sh
              bash poc/HOST_create_dummy_users.sh > /dev/null 2>&1
              
              # 3. execute poc, catch output and return code
              chmod +x "$script"
              set +e # disable immediate bash exit on error for the sub-script
              OUTPUT=$(bash "$script" 2>&1)
              POC_EXIT_CODE=$?
              set -e 
              
              # print output for logs
              echo "$OUTPUT"
              
              # 4. cleanup server
              kill $APP_PID
              wait $APP_PID 2>/dev/null || true
              
              # 5. exec eval
              if [ $POC_EXIT_CODE -eq 0 ]; then
                  echo "TEST PASSED: Attack blocked successfully. (Exit $POC_EXIT_CODE)"
              else
                  echo "PIPELINE FAILED: The output indicates the system is still VULNERABLE. (Exit $POC_EXIT_CODE)"
                  exit 1
              fi
          done
